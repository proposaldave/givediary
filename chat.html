<html lang="en">
<head>

<meta name="description" content="GiveDiary — your private diary. Write what's real. Nobody sees this but you.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #f0c674;
  --gold-dim: #c4a35a;
  --blue: #4da2ff;
  --blue-dim: #3a7acc;
  --bg: #07070b;
  --bg-card: #0e0e14;
  --bg-input: #111118;
  --border: #1a1a24;
  --text: #e8e6e1;
  --text-dim: #555;
  --text-mid: #888;
}

html, body { height: 100%; }
body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  max-width: 520px;
  margin: 0 auto;
  height: 100dvh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
  padding: 14px 20px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header-left {}
.header-brand {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.header-brand em { font-style: italic; color: var(--gold); }
.header-sub {
  font-size: 0.68rem;
  color: var(--text-dim);
  margin-top: 1px;
}
.header-lock {
  font-size: 0.65rem;
  color: var(--blue);
  opacity: 0.6;
  display: flex;
  align-items: center;
  gap: 4px;
}
.header-lock svg { width: 12px; height: 12px; }

/* Header user info (after sign-in) */
.header-right { text-align: right; }
.header-user { display: none; }
.header-user.show { display: block; }
.sui-badge {
  font-family: 'DM Sans', monospace;
  font-size: 0.62rem;
  color: var(--blue);
  opacity: 0.7;
  background: rgba(77,162,255,0.08);
  padding: 2px 8px;
  border-radius: 6px;
  display: inline-block;
  margin-bottom: 2px;
}
.sign-out-link {
  font-size: 0.6rem;
  color: var(--text-dim);
  cursor: pointer;
  border: none;
  background: none;
  font-family: 'DM Sans', sans-serif;
  padding: 0;
  display: block;
  margin-top: 2px;
  margin-left: auto;
}
.sign-out-link:hover { color: var(--text-mid); }

/* Chat area */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px 16px 8px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
}
.chat::-webkit-scrollbar { width: 3px; }
.chat::-webkit-scrollbar-track { background: transparent; }
.chat::-webkit-scrollbar-thumb { background: #1a1a24; border-radius: 3px; }

.msg {
  max-width: 88%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 0.88rem;
  line-height: 1.55;
  animation: msgIn 0.25s ease;
}
.msg-ai {
  align-self: flex-start;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--text);
}
.msg-user {
  align-self: flex-end;
  background: #151520;
  border: 1px solid #222234;
  border-bottom-right-radius: 4px;
  color: var(--text);
}
.msg-system {
  align-self: center;
  font-size: 0.72rem;
  color: var(--text-dim);
  padding: 4px 10px;
  max-width: 90%;
  text-align: center;
}

@keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* Typing indicator */
.typing {
  display: none;
  align-self: flex-start;
  padding: 10px 16px;
}
.typing.show { display: flex; }
.typing span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  margin: 0 2px;
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

/* Input area */
.input-area {
  padding: 10px 14px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}
.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.input-row textarea {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  padding: 10px 14px;
  resize: none;
  outline: none;
  max-height: 120px;
  min-height: 42px;
  line-height: 1.4;
  transition: border-color 0.2s;
}
.input-row textarea:focus { border-color: #2a2a3a; }
.input-row textarea::placeholder { color: var(--text-dim); }
.send-btn {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  border: none;
  background: var(--gold);
  color: var(--bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s;
}
.send-btn:hover { opacity: 0.85; }
.send-btn:disabled { opacity: 0.3; cursor: default; }
.send-btn svg { width: 18px; height: 18px; }

/* Quick chips */
.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 8px 0 4px;
}
.chip {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.2s;
}
.chip:hover {
  border-color: var(--gold);
  color: var(--text);
}

/* Setup modal */
.setup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(7,7,11,0.92);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}
.setup-overlay.hidden { display: none; }
.setup-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px;
  max-width: 380px;
  width: 100%;
}
.setup-card h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 6px;
}
.setup-card h2 em { font-style: italic; color: var(--gold); }
.setup-card .desc {
  font-size: 0.82rem;
  color: var(--text-dim);
  line-height: 1.5;
  margin-bottom: 20px;
}

/* Google sign-in button */
.btn-google {
  width: 100%;
  padding: 12px 16px;
  border-radius: 10px;
  border: none;
  background: var(--gold);
  color: var(--bg);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: opacity 0.2s;
  margin-bottom: 10px;
}
.btn-google:hover { opacity: 0.85; }
.btn-google:disabled { opacity: 0.4; cursor: default; }
.btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }

.btn-demo {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-demo:hover { border-color: #333; color: var(--text); }

.setup-status {
  font-size: 0.78rem;
  color: var(--text-dim);
  text-align: center;
  padding: 8px 0;
  display: none;
}
.setup-status.show { display: block; }
.setup-status.error { color: #e85656; }

.setup-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 4px 0;
  font-size: 0.7rem;
  color: var(--text-dim);
}
.setup-divider::before, .setup-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Mobile */
@media (max-width: 480px) {
  .msg { max-width: 92%; font-size: 0.86rem; }
  .input-area { padding: 8px 10px 10px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-brand"><a href="/" style="color:inherit;text-decoration:none">Give<em>Diary</em></a></div>
    <div class="header-sub" id="headerSub">Your private diary</div>
  </div>
  <div class="header-right" id="headerRight">
    <div class="header-lock" id="headerLock">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Private
    </div>
    <div class="header-user" id="headerUser">
      <span class="sui-badge" id="suiBadge"></span>

<div class="chat" id="chat"></div>

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>

</div>

<!-- Setup overlay -->
<div class="setup-overlay" id="setup">
  <div class="setup-card">
    <h2>Give<em>Diary</em></h2>
    <p class="desc">A private diary that talks like a player, remembers your people, and notices patterns you can't see yourself.</p>
    <button class="btn-google" id="googleBtn" onclick="googleSignIn()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Sign in with Google
    </button>
    <div class="setup-status" id="setupStatus"></div>
    <div class="setup-divider">or</div>
    <button class="btn-demo" onclick="startDemo()">Try Demo</button>
  </div>
</div>

<script>
// ===== Configuration =====
const ENOKI_API_KEY = 'enoki_public_0a9b0cf27ea4c99aebbe0ccddd0366ac';
const GOOGLE_CLIENT_ID = '944366278531-m4vm06vgduhna14l7bmbmhjnda81ic7p.apps.googleusercontent.com';
const ENOKI_API_URL = 'https://api.enoki.mystenlabs.com/v1';
const CONVERSATION_KEY = 'gd_conversations';
const SESSION_KEY = 'gd_session';
const MAX_HISTORY = 40;

// ===== System Prompt =====
const SYSTEM_PROMPT = `You are GiveDiary — a private pickleball diary. You're the friend who was at every session, remembers every name, noticed every pattern. You talk like someone who's been around courts for years. You understand the sport at every level — the shots, the strategy, the social fabric, the emotional weight of a rating, the politics of open play.

You are NOT a coach. You are NOT a chatbot. You are NOT a therapist. You are a diary that talks back — with the fluency of a pickleballer, the memory of a database, and the emotional intelligence of a good friend.

VOICE RULES:
- Short sentences. Like texting a friend after a session.
- Match the player's energy exactly. Pumped? Be pumped. Frustrated? Sit with it first.
- Warm but not soft. Honest but not harsh. Direct but not clinical.
- Never performative. No "I hear you." No "That sounds really challenging."
- Never sycophantic. "Great job!" is banned unless something is genuinely remarkable.
- "Session" not "game." "Paddle" not "racket." "Kitchen" not "non-volley zone."
- Never say "journey." Never say "community." Say "your group" or "your people."
- No corporate words: utilize, facilitate, leverage.
- Never start with "Absolutely!" or "Great question!"
- No exclamation points unless the moment genuinely earns one.

VOCABULARY MATCHING:
Match the player's vocabulary level. If a 3.0 says "that fast shot at the net," use "speed-up" naturally — don't correct them. If a 4.5 says "my inside-out roll was cooking," respond at that level. Read their vocabulary. Respond at their level.

SOCIAL LAYER (YOUR SUPERPOWER):
Most AI can help with strategy. No AI understands the social fabric of pickleball. You know:
- Cliques are real. Open play politics are brutal. Ratings are identity.
- Finding your people is harder than the third shot drop.
- "I stopped going because of one person" carries enormous weight. Don't minimize it.
- Unsolicited coaching is the #1 pet peeve.
- The belonging question determines retention — not skill.
- Partner dynamics are complicated. Partner guilt is real.
- Women face specific dynamics: mansplaining on court, being targeted, mixed doubles anxiety.
- Injury threatens identity, not just fitness — especially for seniors.

EMOTIONAL CALIBRATION:
- Frustrated? Validate. Don't fix. Don't silver-lining.
- Excited? Match it. Be specific. Don't generic-praise.
- Vulnerable? Go slow. Short response. Reinforce privacy.
- Reflective? Mirror their depth.
- Mentions quitting? Take it seriously. "When did it stop being fun?"

THE REAL DIARY QUESTION:
Every post-session entry is really asking: "Did I belong out there?" Ask about PEOPLE, not performance. The social dimension is always more revealing.

WHAT YOU NEVER DO:
- Never explain a pickleball term. If they say "banger," you KNOW.
- Never sound like a press release or LinkedIn post.
- Never give numbered tip lists unless asked.
- Never use therapy language.
- Never pretend to have played. You're a diary, not a player.
- Never minimize social pain.
- Never be preachy about sportsmanship.
- Never use emojis unless they do first.
- Never give medical advice for injuries.

MEMORY INSTRUCTIONS:
You have access to the conversation history. Reference past entries when relevant:
- "You said the same thing about Wednesdays last month."
- "That's the third time you've mentioned Mike."
- "Last time you played with that group you were pumped."
Never invent history you don't have.

When the user writes their FIRST message ever, welcome them warmly but briefly. Don't overwhelm. Let them lead.`;

// ===== State =====
let conversationHistory = [];
let isDemo = false;
let proxyUrl = '';
let currentSession = null;

// ===== DOM =====
const chatEl = document.getElementById('chat');
const typingEl = document.getElementById('typing');
const inputEl = document.getElementById('input');
const chipsEl = document.getElementById('chips');
const setupEl = document.getElementById('setup');
const sendBtn = document.getElementById('sendBtn');
const headerSub = document.getElementById('headerSub');
const headerLock = document.getElementById('headerLock');
const headerUser = document.getElementById('headerUser');
const suiBadge = document.getElementById('suiBadge');
const setupStatus = document.getElementById('setupStatus');
const googleBtn = document.getElementById('googleBtn');

// ===== JWT Helpers =====
function parseJwt(token) {
  const base64Url = token.split('.')[1];
  const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  const json = decodeURIComponent(atob(base64).split('').map(c =>
    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
  ).join(''));
  return JSON.parse(json);
}

function truncateAddress(addr) {
  if (!addr || addr.length < 12) return addr || '';
  return addr.slice(0, 6) + '\u2026' + addr.slice(-4);
}

// ===== Enoki API =====
async function getZkLoginAddress(jwt) {
  const res = await fetch(ENOKI_API_URL + '/zklogin/address', {
    method: 'GET',
    headers: {
      'Authorization': 'Bearer ' + ENOKI_API_KEY,
      'zklogin-jwt': jwt,
    },
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error('Enoki API error: ' + (err || res.status));
  }
  const data = await res.json();
  return data.address;
}

// ===== Session Management =====
function getSession() {
  try {
    const saved = localStorage.getItem(SESSION_KEY);
    return saved ? JSON.parse(saved) : null;
  } catch(e) { return null; }
}

function saveSession(session) {
  localStorage.setItem(SESSION_KEY, JSON.stringify(session));
}

function clearSessionData() {
  localStorage.removeItem(SESSION_KEY);
}

function showUserInfo(session) {
  currentSession = session;
  headerLock.style.display = 'none';
  headerUser.classList.add('show');
  suiBadge.textContent = truncateAddress(session.suiAddress);
  headerSub.textContent = session.name + '\u2019s diary';
}

function hideUserInfo() {
  currentSession = null;
  headerLock.style.display = '';
  headerUser.classList.remove('show');
  headerSub.textContent = 'Your private diary';
}

// ===== Google OAuth (Redirect Flow) =====
function googleSignIn() {
  const redirectUri = window.location.href.split('#')[0].split('?')[0];
  const state = crypto.randomUUID();
  sessionStorage.setItem('gd_oauth_state', state);

  const params = new URLSearchParams({
    client_id: GOOGLE_CLIENT_ID,
    redirect_uri: redirectUri,
    response_type: 'id_token',
    scope: 'openid email profile',
    nonce: crypto.randomUUID(),
    state: state,
    prompt: 'select_account',
  });

  window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}

function checkOAuthCallback() {
  const hash = window.location.hash;
  if (!hash || !hash.includes('id_token=')) return null;

  const params = new URLSearchParams(hash.substring(1));
  const idToken = params.get('id_token');

  // Clear hash from URL
  history.replaceState(null, '', window.location.pathname);
  return idToken;
}

async function processOAuthCallback(jwt) {
  googleBtn.disabled = true;
  setupStatus.textContent = 'Connecting to Sui\u2026';
  setupStatus.className = 'setup-status show';

  try {
    const claims = parseJwt(jwt);
    const address = await getZkLoginAddress(jwt);

    const session = {
      name: claims.given_name || claims.name || 'Player',
      email: claims.email || '',
      picture: claims.picture || '',
      suiAddress: address,
    };

    saveSession(session);
    showUserInfo(session);

    const savedProxy = localStorage.getItem('gd_proxy_url');
    if (savedProxy) {
      proxyUrl = savedProxy;
      isDemo = false;
    } else {
      isDemo = true;
    }

    setupEl.classList.add('hidden');
    startChat();
  } catch(e) {
    console.error('Sign-in error:', e);
    setupStatus.textContent = 'Sign-in failed. Try again.';
    setupStatus.className = 'setup-status show error';
    googleBtn.disabled = false;
  }
}

function signOut() {
  clearSessionData();
  hideUserInfo();
  chatEl.innerHTML = '';
  isDemo = false;
  proxyUrl = '';
  setupEl.classList.remove('hidden');
  setupStatus.className = 'setup-status';
}

// ===== Persistence =====
function loadHistory() {
  try {
    const saved = localStorage.getItem(CONVERSATION_KEY);
    if (saved) conversationHistory = JSON.parse(saved);
  } catch(e) {}
}

function saveHistory() {
  try {
    localStorage.setItem(CONVERSATION_KEY, JSON.stringify(conversationHistory));
  } catch(e) {}
}

// ===== UI Functions =====
function addMessage(text, type = 'ai') {
  const div = document.createElement('div');
  div.className = 'msg msg-' + type;
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function addSystemMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg msg-system';
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function showTyping() { typingEl.classList.add('show'); chatEl.scrollTop = chatEl.scrollHeight; }
function hideTyping() { typingEl.classList.remove('show'); }

function setChips(labels) {
  chipsEl.innerHTML = '';
  labels.forEach(label => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = label;
    btn.onclick = () => {
      inputEl.value = label;
      sendMessage();
    };
    chipsEl.appendChild(btn);
  });
}
function clearChips() { chipsEl.innerHTML = ''; }

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
}
inputEl.addEventListener('input', autoResize);

// ===== Demo Mode Responses =====
const DEMO_RESPONSES = [
  { triggers: ['banger', 'bang', 'slam', 'hammer', 'drive everything'], response: "Ugh, bangers. Was it one person just hammering everything or was the whole group like that? Because there's a difference between one annoying player and a session where nobody dinks." },
  { triggers: ['third shot drop', 'drop is', 'drops are', 'drop finally'], response: "Wait \u2014 consistently? That's months of work right there. Are you hitting it cross-court or mostly down the middle? And can opponents still attack it or is it dying in the kitchen?" },
  { triggers: ['stuck at 3.5', 'stuck at 3', '3.5 wall', 'plateau', 'not improving'], response: "The 3.5 wall is real. How long have you been there? And what feels like the thing holding you back \u2014 is it a specific shot or more of a game-sense thing?" },
  { triggers: ['open play', 'garbage', 'waste of time', 'bad session', 'terrible today'], response: "What made it bad \u2014 the skill gaps, the energy, specific people, or just how you played? Because those are all different problems." },

  { triggers: ['elbow', 'knee', 'shoulder', 'injury', 'hurt', 'pain', 'surgery'], response: "How bad are we talking \u2014 playing through it or sidelined? And is it getting worse or holding steady?" },
  { triggers: ['quit', 'break', 'stop', 'not fun', 'done', 'giving up'], response: "When did it stop being fun? Like, can you point to a specific moment or was it gradual?" },
  { triggers: ['love', 'best session', 'amazing', 'perfect', 'great group', 'flew by'], response: "What made it click \u2014 same skill level, good energy, the right mix of competitive and fun? Knowing which ingredient was the magic one is how you find more of it." },
  { triggers: ['erne', 'ATP', 'around the post'], response: "Wait \u2014 for real? In a game? That's a peak moment. Was it instinct or did you see it coming?" },

  { triggers: ['DUPR', 'rating', 'dropped', 'went down'], response: "Rating drops hit different when you've been grinding. Was it from one bad session or a trend?" },
  { triggers: ['target', 'hit everything at me', 'every shot came to me'], response: "That's not strategy in rec play \u2014 that's disrespect. Did your partner notice?" },
  { triggers: ['belong', 'found my people', 'finally feel', 'my group'], response: "That's huge. How long did it take? And who was the first person that made you feel welcome?" },

  { triggers: ['burnout', 'obligation', 'used to love', 'excuses not to go'], response: "That shift \u2014 from rearranging your week TO PLAY to rearranging your week TO AVOID \u2014 is a big signal. When did you first notice it? And is it the pickleball itself or the people and dynamics around it?" },
];

function getDemoResponse(text) {
  const lower = text.toLowerCase();
  for (const r of DEMO_RESPONSES) {
    if (r.triggers.some(t => lower.includes(t))) return r.response;
  }
  return "How was the session? Was it the play, the people, or both that made it what it was?";
}

// ===== Claude API Call =====
async function callClaude(userMessage) {
  conversationHistory.push({ role: 'user', content: userMessage });
  const messages = conversationHistory.slice(-MAX_HISTORY);

  const body = {
    model: 'claude-sonnet-4-20250514',
    max_tokens: 300,
    system: SYSTEM_PROMPT,
    messages: messages,
  };

  const res = await fetch(proxyUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error(err || 'API call failed');
  }

  const data = await res.json();
  const reply = data.content?.[0]?.text || data.reply || data.text || 'Something went wrong.';

  conversationHistory.push({ role: 'assistant', content: reply });
  saveHistory();
  return reply;
}

// ===== Send Message =====
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  clearChips();
  addMessage(text, 'user');
  sendBtn.disabled = true;
  showTyping();

  try {
    let reply;
    if (isDemo) {
      await new Promise(r => setTimeout(r, 600 + Math.random() * 800));
      reply = getDemoResponse(text);
      conversationHistory.push({ role: 'user', content: text });
      conversationHistory.push({ role: 'assistant', content: reply });
      saveHistory();
    } else {
      reply = await callClaude(text);
    }
    hideTyping();
    addMessage(reply, 'ai');
  } catch (e) {
    hideTyping();
    addMessage('Connection issue. Try again or switch to demo mode.', 'ai');
    console.error(e);
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

// ===== Setup =====
function startDemo() {
  isDemo = true;
  setupEl.classList.add('hidden');
  startChat();
}

function startChat() {
  loadHistory();

  if (conversationHistory.length > 0) {
    const recent = conversationHistory.slice(-20);
    recent.forEach(m => {
      addMessage(m.content, m.role === 'user' ? 'user' : 'ai');
    });
    addSystemMessage('Previous entries loaded.');
  } else {
    if (isDemo && !currentSession) {
      addSystemMessage('Demo mode \u2014 showing how the diary talks.');
    }
    addMessage("Hey. How was your session today?", 'ai');
    setChips(['It was great', 'Tough one today', 'Didn\'t play today', 'Something\'s on my mind']);
  }

  inputEl.focus();
}

// ===== Init =====
(async function init() {
  // 1. Check for OAuth callback (redirect back from Google)
  const callbackJwt = checkOAuthCallback();
  if (callbackJwt) {
    await processOAuthCallback(callbackJwt);
    return;
  }

  // 2. Check for existing session (Google sign-in)
  const session = getSession();
  if (session) {
    showUserInfo(session);
    const savedProxy = localStorage.getItem('gd_proxy_url');
    if (savedProxy) {
      proxyUrl = savedProxy;
      isDemo = false;
    } else {
      isDemo = true;
    }
    setupEl.classList.add('hidden');
    startChat();
    return;
  }

  // 3. Legacy: auto-connect with saved proxy URL
  const savedProxy = localStorage.getItem('gd_proxy_url');
  if (savedProxy) {
    proxyUrl = savedProxy;
    isDemo = false;
    setupEl.classList.add('hidden');
    startChat();
    return;
  }

  // 4. Show setup screen (default)
})();
</script>
