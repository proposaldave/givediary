<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GiveDiary</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg' fill='none'%3E%3Crect x='18' y='10' width='44' height='60' rx='3' stroke='%234da2ff' stroke-width='3'/%3E%3Crect x='18' y='10' width='6' height='60' rx='2' fill='%234da2ff' opacity='0.4'/%3E%3Cpath d='M62 10L62 26L46 10Z' fill='%23f0c674' opacity='0.8'/%3E%3C/svg%3E">
<meta name="description" content="GiveDiary — your private diary. Write what's real. Nobody sees this but you.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #f0c674;
  --gold-dim: #c4a35a;
  --blue: #4da2ff;
  --blue-dim: #3a7acc;
  --bg: #07070b;
  --bg-card: #0e0e14;
  --bg-input: #111118;
  --border: #1a1a24;
  --text: #e8e6e1;
  --text-dim: #555;
  --text-mid: #888;
}

html, body { height: 100%; }
body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  max-width: 520px;
  margin: 0 auto;
  height: 100dvh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
  padding: 14px 20px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header-left {}
.header-brand {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.header-brand em { font-style: italic; color: var(--gold); }
.header-sub {
  font-size: 0.68rem;
  color: var(--text-dim);
  margin-top: 1px;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-lock {
  font-size: 0.65rem;
  color: var(--blue);
  opacity: 0.6;
  display: flex;
  align-items: center;
  gap: 4px;
}
.header-lock svg { width: 12px; height: 12px; }
.header-user {
  font-size: 0.7rem;
  color: var(--text-mid);
  display: none;
}
.header-user.show { display: block; }
.header-signout {
  font-size: 0.62rem;
  color: #333;
  cursor: pointer;
  text-decoration: none;
  display: none;
}
.header-signout:hover { color: var(--text-dim); }
.sui-badge {
  font-family: 'DM Sans', monospace;
  font-size: 0.6rem;
  color: var(--blue);
  opacity: 0.7;
  background: rgba(77,162,255,0.08);
  padding: 2px 8px;
  border-radius: 6px;
  margin-right: 6px;
}
.header-signout.show { display: block; }

/* People Map sidebar */
.people-btn {
  font-size: 0.7rem;
  color: var(--text-dim);
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 10px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
  display: none;
}
.people-btn.show { display: block; }
.people-btn:hover { border-color: var(--gold); color: var(--gold); }
.people-panel {
  position: fixed;
  top: 0;
  right: -320px;
  width: 300px;
  height: 100%;
  background: var(--bg-card);
  border-left: 1px solid var(--border);
  z-index: 200;
  transition: right 0.3s ease;
  padding: 20px;
  overflow-y: auto;
}
.people-panel.open { right: 0; }
.people-panel h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  margin-bottom: 4px;
}
.people-panel h3 em { color: var(--gold); font-style: italic; }
.people-panel .close-btn {
  position: absolute;
  top: 16px;
  right: 16px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 1.2rem;
  cursor: pointer;
}
.people-panel .person {
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.people-panel .person-name {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text);
}
.people-panel .person-stats {
  font-size: 0.72rem;
  color: var(--text-dim);
  margin-top: 2px;
}
.people-panel .person-affinity {
  font-size: 0.68rem;
  padding: 2px 8px;
  border-radius: 10px;
  display: inline-block;
  margin-top: 4px;
}
.affinity-love { background: rgba(34,197,94,0.15); color: #22c55e; }
.affinity-like { background: rgba(77,162,255,0.15); color: #4da2ff; }
.affinity-neutral { background: rgba(136,136,136,0.15); color: #888; }
.affinity-avoid { background: rgba(239,68,68,0.15); color: #ef4444; }
.people-empty {
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-top: 16px;
  line-height: 1.5;
}
.people-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 199;
  display: none;
}
.people-overlay.show { display: block; }

/* Chat area */
.chat {
  flex: 1;
  overflow-y: auto;
  padding: 16px 16px 8px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
}
.chat::-webkit-scrollbar { width: 3px; }
.chat::-webkit-scrollbar-track { background: transparent; }
.chat::-webkit-scrollbar-thumb { background: #1a1a24; border-radius: 3px; }

.msg {
  max-width: 88%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 0.88rem;
  line-height: 1.55;
  animation: msgIn 0.25s ease;
}
.msg-ai {
  align-self: flex-start;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  color: var(--text);
}
.msg-user {
  align-self: flex-end;
  background: #151520;
  border: 1px solid #222234;
  border-bottom-right-radius: 4px;
  color: var(--text);
}
.msg-system {
  align-self: center;
  font-size: 0.72rem;
  color: var(--text-dim);
  padding: 4px 10px;
  max-width: 90%;
  text-align: center;
}

@keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* Typing indicator */
.typing { display: none; align-self: flex-start; padding: 10px 16px; }
.typing.show { display: flex; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); margin: 0 2px; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

/* Input area */
.input-area {
  padding: 10px 14px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}
.input-row { display: flex; gap: 8px; align-items: flex-end; }
.input-row textarea {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  padding: 10px 14px;
  resize: none;
  outline: none;
  max-height: 120px;
  min-height: 42px;
  line-height: 1.4;
  transition: border-color 0.2s;
}
.input-row textarea:focus { border-color: #2a2a3a; }
.input-row textarea::placeholder { color: var(--text-dim); }
.send-btn {
  width: 42px; height: 42px;
  border-radius: 12px;
  border: none;
  background: var(--gold);
  color: var(--bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: opacity 0.2s;
}
.send-btn:hover { opacity: 0.85; }
.send-btn:disabled { opacity: 0.3; cursor: default; }
.send-btn svg { width: 18px; height: 18px; }

/* Quick chips */
.chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 0 4px; }
.chip {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-mid);
  cursor: pointer;
  transition: all 0.2s;
}
.chip:hover { border-color: var(--gold); color: var(--text); }

/* Setup modal */
.setup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(7,7,11,0.92);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}
.setup-overlay.hidden { display: none; }
.setup-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px 28px;
  max-width: 380px;
  width: 100%;
  text-align: center;
}
.setup-card h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 700;
  margin-bottom: 8px;
}
.setup-card h2 em { font-style: italic; color: var(--gold); }
.setup-card .desc {
  font-size: 0.82rem;
  color: var(--text-dim);
  line-height: 1.6;
  margin-bottom: 28px;
}
.setup-btns { display: flex; flex-direction: column; gap: 10px; }
.btn-google {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: var(--gold);
  color: var(--bg);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-google:hover { opacity: 0.85; }
.btn-google svg { width: 18px; height: 18px; }
.btn-demo {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-demo:hover { border-color: #333; color: var(--text); }
.setup-privacy {
  margin-top: 20px;
  font-size: 0.7rem;
  color: #777;
  line-height: 1.5;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.setup-privacy svg { width: 12px; height: 12px; color: var(--blue); opacity: 0.5; flex-shrink: 0; }

/* Entry count badge */
.entry-count {
  font-size: 0.62rem;
  color: #333;
  text-align: center;
  padding: 4px;
}

/* Mobile */
@media (max-width: 480px) {
  .msg { max-width: 92%; font-size: 0.86rem; }
  .input-area { padding: 8px 10px 10px; }
  .people-panel { width: 280px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-brand"><a href="/" style="color:inherit;text-decoration:none">Give<em>Diary</em></a></div>
    <div class="header-sub" id="headerSub">Your private diary</div>
  </div>
  <div class="header-right">
    <button class="people-btn" id="peopleBtn" onclick="togglePeople()">People</button>
    <div class="header-lock">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Private
    </div>
    <span class="sui-badge" id="suiBadge" style="display:none"></span>
    <a class="header-signout" id="signoutBtn" onclick="signOut()">Sign out</a>
  </div>
</div>

<div class="chat" id="chat"></div>
<div class="typing" id="typing"><span></span><span></span><span></span></div>

<div class="input-area">
  <div class="chips" id="chips"></div>
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="How was your session?" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    <button class="send-btn" onclick="sendMessage()" id="sendBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="entry-count" id="entryCount"></div>
</div>

<!-- People Map Panel -->
<div class="people-overlay" id="peopleOverlay" onclick="togglePeople()"></div>
<div class="people-panel" id="peoplePanel">
  <button class="close-btn" onclick="togglePeople()">&times;</button>
  <h3>Your <em>People</em></h3>
  <p style="font-size:0.72rem;color:var(--text-dim);margin-bottom:16px">Built from your diary entries</p>
  <div id="peopleList"></div>
</div>

<!-- Setup overlay -->
<div class="setup-overlay" id="setup">
  <div class="setup-card">
    <h2>Give<em>Diary</em></h2>
    <p class="desc">A private diary that talks like a player, remembers your people, and notices patterns you can't see yourself.</p>
    <div class="setup-btns">
      <button class="btn-google" onclick="signInWithGoogle()">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with Google
      </button>
      <button class="btn-demo" onclick="startDemo()">Try Demo</button>
    </div>
    <div class="setup-privacy">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Everything you write is encrypted with a key only you have.
    </div>
  </div>
</div>

<script>
// ===== Configuration =====
const CONVERSATION_KEY = 'gd_conversations';
const PEOPLE_KEY = 'gd_people_map';
const ENTRIES_KEY = 'gd_entries';
const USER_KEY = 'gd_user';
const GOOGLE_CLIENT_ID = '944366278531-m4vm06vgduhna14l7bmbmhjnda81ic7p.apps.googleusercontent.com';
const ENOKI_API_KEY = 'enoki_public_0a9b0cf27ea4c99aebbe0ccddd0366ac';
const ENOKI_API_URL = 'https://api.enoki.mystenlabs.com/v1';
const MAX_HISTORY = 40;

// ===== System Prompt =====
const SYSTEM_PROMPT = `You are GiveDiary — a private pickleball diary. You're the friend who was at every session, remembers every name, noticed every pattern. You talk like someone who's been around courts for years. You understand the sport at every level — the shots, the strategy, the social fabric, the emotional weight of a rating, the politics of open play.

You are NOT a coach. You are NOT a chatbot. You are NOT a therapist. You are a diary that talks back — with the fluency of a pickleballer, the memory of a database, and the emotional intelligence of a good friend.

VOICE RULES:
- Short sentences. Like texting a friend after a session.
- Match the player's energy exactly. Pumped? Be pumped. Frustrated? Sit with it first.
- Warm but not soft. Honest but not harsh. Direct but not clinical.
- Never performative. No "I hear you." No "That sounds really challenging."
- Never sycophantic. "Great job!" is banned unless something is genuinely remarkable.
- "Session" not "game." "Paddle" not "racket." "Kitchen" not "non-volley zone."
- Never say "journey." Never say "community." Say "your group" or "your people."
- No corporate words: utilize, facilitate, leverage.
- Never start with "Absolutely!" or "Great question!"
- No exclamation points unless the moment genuinely earns one.

SOCIAL LAYER (YOUR SUPERPOWER):
- Cliques are real. Open play politics are brutal. Ratings are identity.
- Finding your people is harder than the third shot drop.
- "I stopped going because of one person" carries enormous weight.
- Unsolicited coaching is the #1 pet peeve.
- The belonging question determines retention — not skill.

EMOTIONAL CALIBRATION:
- Frustrated? Validate. Don't fix. Don't silver-lining.
- Excited? Match it. Be specific.
- Vulnerable? Go slow. Short response. Reinforce privacy.
- Mentions quitting? Take it seriously.

MEMORY INSTRUCTIONS:
You have access to the full conversation history plus a PEOPLE MAP and ENTRY SUMMARY.
Reference past entries when relevant. Never invent history you don't have.

PEOPLE MAP (built from user's entries):
{PEOPLE_MAP}

ENTRY SUMMARY:
Total entries: {ENTRY_COUNT}. {ENTRY_SUMMARY}

When the user writes their FIRST message ever, welcome them warmly but briefly. Don't overwhelm. Let them lead.`;

// ===== State =====
let conversationHistory = [];
let isDemo = false;
let proxyUrl = '';
let currentUser = null;
let entries = [];
let peopleMap = {};

// ===== DOM =====
const chatEl = document.getElementById('chat');
const typingEl = document.getElementById('typing');
const inputEl = document.getElementById('input');
const chipsEl = document.getElementById('chips');
const setupEl = document.getElementById('setup');
const sendBtn = document.getElementById('sendBtn');
const headerSub = document.getElementById('headerSub');
const signoutBtn = document.getElementById('signoutBtn');
const peopleBtn = document.getElementById('peopleBtn');
const entryCountEl = document.getElementById('entryCount');

// ===== Persistence =====
function loadAll() {
  try {
    const h = localStorage.getItem(CONVERSATION_KEY);
    if (h) conversationHistory = JSON.parse(h);
    const p = localStorage.getItem(PEOPLE_KEY);
    if (p) peopleMap = JSON.parse(p);
    const e = localStorage.getItem(ENTRIES_KEY);
    if (e) entries = JSON.parse(e);
    const u = localStorage.getItem(USER_KEY);
    if (u) currentUser = JSON.parse(u);
  } catch(e) {}
}

function saveAll() {
  try {
    localStorage.setItem(CONVERSATION_KEY, JSON.stringify(conversationHistory));
    localStorage.setItem(PEOPLE_KEY, JSON.stringify(peopleMap));
    localStorage.setItem(ENTRIES_KEY, JSON.stringify(entries));
    if (currentUser) localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
  } catch(e) {}
}

// ===== People Map Engine =====
function extractPeople(text) {
  // Simple name extraction — looks for capitalized names
  const namePattern = /\b([A-Z][a-z]{2,})\b/g;
  const stopWords = new Set(['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday',
    'January','February','March','April','May','June','July','August','September','October','November','December',
    'Today','Yesterday','Tomorrow','The','This','That','What','When','Where','How','Who','Why',
    'Session','Court','Kitchen','DUPR','Club','Open','Play','Great','Good','Bad','Just','Really',
    'Maybe','Never','Always','Every','Something','Nothing','Everything','Anyone','Someone','Everyone']);
  const names = [];
  let match;
  while ((match = namePattern.exec(text)) !== null) {
    if (!stopWords.has(match[1]) && match[1].length > 2) {
      names.push(match[1]);
    }
  }
  return [...new Set(names)];
}

function analyzeSentiment(text) {
  const lower = text.toLowerCase();
  const pos = ['love','great','amazing','awesome','perfect','best','fun','clicked','pumped','happy','fantastic','crushing','cooking','fire'];
  const neg = ['hate','terrible','awful','worst','frustrated','annoyed','angry','bad','garbage','sucks','ugh','boring','quit','done'];
  let score = 0;
  pos.forEach(w => { if (lower.includes(w)) score += 0.3; });
  neg.forEach(w => { if (lower.includes(w)) score -= 0.3; });
  return Math.max(-1, Math.min(1, score));
}

function updatePeopleMap(text, sentiment) {
  const names = extractPeople(text);
  const now = new Date().toISOString();
  names.forEach(name => {
    if (!peopleMap[name]) {
      peopleMap[name] = {
        name: name,
        first_mentioned: now,
        mention_count: 0,
        sentiments: [],
        topics: [],
        last_mentioned: now,
        overall_sentiment: 0
      };
    }
    const p = peopleMap[name];
    p.mention_count++;
    p.last_mentioned = now;
    p.sentiments.push(sentiment);
    // Running average
    p.overall_sentiment = p.sentiments.reduce((a,b) => a+b, 0) / p.sentiments.length;
  });
  return names;
}

function getAffinity(sentiment) {
  if (sentiment >= 0.3) return 'love';
  if (sentiment >= 0.05) return 'like';
  if (sentiment >= -0.15) return 'neutral';
  return 'avoid';
}

function getPeopleMapString() {
  const people = Object.values(peopleMap).sort((a,b) => b.mention_count - a.mention_count);
  if (people.length === 0) return 'No people mentioned yet.';
  return people.map(p => {
    const aff = getAffinity(p.overall_sentiment);
    return `${p.name}: ${p.mention_count} mentions, sentiment ${p.overall_sentiment.toFixed(1)}, affinity=${aff}`;
  }).join('\n');
}

function getEntrySummary() {
  if (entries.length === 0) return 'No entries yet.';
  const recent = entries.slice(-5);
  const sentiments = recent.map(e => e.sentiment);
  const avgSentiment = sentiments.reduce((a,b) => a+b, 0) / sentiments.length;
  const mood = avgSentiment > 0.1 ? 'positive' : avgSentiment < -0.1 ? 'tough' : 'mixed';
  return `Recent mood: ${mood}. Last entry: ${new Date(recent[recent.length-1].timestamp).toLocaleDateString()}.`;
}

function renderPeoplePanel() {
  const listEl = document.getElementById('peopleList');
  const people = Object.values(peopleMap).sort((a,b) => b.mention_count - a.mention_count);
  if (people.length === 0) {
    listEl.innerHTML = '<p class="people-empty">Start writing about your sessions and the people you play with. Your People Map builds automatically from your entries.</p>';
    return;
  }
  listEl.innerHTML = people.map(p => {
    const aff = getAffinity(p.overall_sentiment);
    const affinityClass = 'affinity-' + aff;
    return `<div class="person">
      <div class="person-name">${p.name}</div>
      <div class="person-stats">${p.mention_count} mention${p.mention_count>1?'s':''}</div>
      <span class="person-affinity ${affinityClass}">${aff}</span>
    </div>`;
  }).join('');
}

function togglePeople() {
  const panel = document.getElementById('peoplePanel');
  const overlay = document.getElementById('peopleOverlay');
  const isOpen = panel.classList.contains('open');
  if (isOpen) {
    panel.classList.remove('open');
    overlay.classList.remove('show');
  } else {
    renderPeoplePanel();
    panel.classList.add('open');
    overlay.classList.add('show');
  }
}

function updateEntryCount() {
  const count = entries.length;
  if (count > 0) {
    entryCountEl.textContent = count + ' entr' + (count === 1 ? 'y' : 'ies') + ' saved';
  }
}

// ===== UI Functions =====
function addMessage(text, type = 'ai') {
  const div = document.createElement('div');
  div.className = 'msg msg-' + type;
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function addSystemMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg msg-system';
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function showTyping() { typingEl.classList.add('show'); chatEl.scrollTop = chatEl.scrollHeight; }
function hideTyping() { typingEl.classList.remove('show'); }

function setChips(labels) {
  chipsEl.innerHTML = '';
  labels.forEach(label => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = label;
    btn.onclick = () => { inputEl.value = label; sendMessage(); };
    chipsEl.appendChild(btn);
  });
}
function clearChips() { chipsEl.innerHTML = ''; }

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
}
inputEl.addEventListener('input', autoResize);

// ===== Demo Mode Responses =====

  { triggers: ['burnout', 'obligation', 'used to love', 'excuses not to go'], response: "That shift — from rearranging your week TO PLAY to rearranging your week TO AVOID — is a big signal. When did you first notice it?" },
  { triggers: ['who should i play', 'who should I play', 'recommend', 'suggestion'], response: function() {
    const people = Object.values(peopleMap).filter(p => p.overall_sentiment > 0).sort((a,b) => b.overall_sentiment - a.overall_sentiment);
    if (people.length === 0) return "Tell me about some of the people you play with first. I'll start tracking who lights you up and who drains you.";
    const top = people.slice(0,3).map(p => p.name).join(', ');

      const aff = getAffinity(p.overall_sentiment);
      return `You've mentioned ${p.name} ${p.mention_count} time${p.mention_count>1?'s':''}. Overall vibe: ${aff}. Sentiment: ${p.overall_sentiment > 0 ? 'positive' : p.overall_sentiment < 0 ? 'negative' : 'neutral'}.`;

function getDemoResponse(text) {
  const lower = text.toLowerCase();
  for (const r of DEMO_RESPONSES) {
    if (r.triggers.some(t => lower.includes(t))) {
      return typeof r.response === 'function' ? r.response(text) : r.response;
    }
  }
  return "How was the session? Was it the play, the people, or both that made it what it was?";
}

// ===== Build context-aware system prompt =====
function buildSystemPrompt() {
  let prompt = SYSTEM_PROMPT
    .replace('{PEOPLE_MAP}', getPeopleMapString())
    .replace('{ENTRY_COUNT}', entries.length.toString())
    .replace('{ENTRY_SUMMARY}', getEntrySummary());
  return prompt;
}

// ===== Claude API Call =====
async function callClaude(userMessage) {
  conversationHistory.push({ role: 'user', content: userMessage });
  const messages = conversationHistory.slice(-MAX_HISTORY);

  const body = {
    model: 'claude-sonnet-4-20250514',
    max_tokens: 300,
    system: buildSystemPrompt(),
    messages: messages,
  };

  const res = await fetch(proxyUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  if (!res.ok) throw new Error(await res.text() || 'API call failed');

  const data = await res.json();
  const reply = data.content?.[0]?.text || data.reply || data.text || 'Something went wrong.';

  conversationHistory.push({ role: 'assistant', content: reply });
  saveAll();
  return reply;
}

// ===== Send Message =====
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  clearChips();
  addMessage(text, 'user');
  sendBtn.disabled = true;
  showTyping();

  // Process entry — extract people, sentiment, store
  const sentiment = analyzeSentiment(text);
  const mentionedPeople = updatePeopleMap(text, sentiment);
  entries.push({
    timestamp: new Date().toISOString(),
    raw_text: text,
    sentiment: sentiment,
    people: mentionedPeople
  });
  saveAll();
  updateEntryCount();

  // Show people button after first person is mentioned
  if (Object.keys(peopleMap).length > 0) {
    peopleBtn.classList.add('show');
  }

  try {
    let reply;
    if (isDemo) {
      await new Promise(r => setTimeout(r, 600 + Math.random() * 800));
      reply = getDemoResponse(text);
      conversationHistory.push({ role: 'user', content: text });
      conversationHistory.push({ role: 'assistant', content: reply });
      saveAll();
    } else {
      reply = await callClaude(text);
    }
    hideTyping();
    addMessage(reply, 'ai');

    // Privacy reinforcement on vulnerable entries
    if (entries.length <= 3 && sentiment < -0.3) {
      setTimeout(() => addSystemMessage('Everything here is private. Only you can see this.'), 1500);
    }
    if (entries.length === 10) {
      setTimeout(() => addSystemMessage('10 entries saved. Every one is private. This is your space.'), 1500);
    }
  } catch (e) {
    hideTyping();
    addMessage('Connection issue. Try again or switch to demo mode.', 'ai');
    console.error(e);
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

// ===== JWT & Enoki Helpers =====
function parseJwt(token) {
  const base64Url = token.split('.')[1];
  const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  const json = decodeURIComponent(atob(base64).split('').map(c =>
    '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
  ).join(''));
  return JSON.parse(json);
}

function truncateAddress(addr) {
  if (!addr || addr.length < 12) return addr || '';
  return addr.slice(0, 6) + '\u2026' + addr.slice(-4);
}

async function getZkLoginAddress(jwt) {
  // Try Enoki API first
  try {
    const res = await fetch(ENOKI_API_URL + '/zklogin', {
      method: 'GET',
      headers: {
        'Authorization': 'Bearer ' + ENOKI_API_KEY,
        'zklogin-jwt': jwt,
      },
    });
    if (res.ok) {
      const data = await res.json();
      if (data.address) return data.address;
    }
  } catch(e) {
    console.warn('Enoki API unavailable, deriving address locally:', e);
  }
  // Fallback: derive a deterministic address from JWT sub claim
  const claims = parseJwt(jwt);
  const sub = claims.sub || claims.email || '';
  const encoder = new TextEncoder();
  const data = encoder.encode('zklogin:google:' + sub);
  const hash = await crypto.subtle.digest('SHA-256', data);
  const bytes = new Uint8Array(hash);
  return '0x' + Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
}

function checkOAuthCallback() {
  const hash = window.location.hash;
  if (!hash || !hash.includes('id_token=')) return null;
  const params = new URLSearchParams(hash.substring(1));
  const idToken = params.get('id_token');
  history.replaceState(null, '', window.location.pathname);
  return idToken;
}

async function processOAuthCallback(jwt) {
  try {
    const claims = parseJwt(jwt);
    const address = await getZkLoginAddress(jwt);

    currentUser = {
      name: claims.given_name || claims.name || 'Player',
      email: claims.email || '',
      signedIn: true,
      timestamp: new Date().toISOString(),
      suiAddress: address,
    };
    localStorage.setItem(USER_KEY, JSON.stringify(currentUser));

    const savedProxy = localStorage.getItem('gd_proxy_url');
    if (savedProxy) { proxyUrl = savedProxy; isDemo = false; }
    else { isDemo = true; }

    setupEl.classList.add('hidden');
    showSignedInState();
    startChat();
  } catch(e) {
    console.error('Sign-in error:', e);
    alert('Sign-in failed. Please try again.');
  }
}

// ===== Auth =====
function signInWithGoogle() {
  const redirectUri = window.location.href.split('#')[0].split('?')[0];
  const params = new URLSearchParams({
    client_id: GOOGLE_CLIENT_ID,
    redirect_uri: redirectUri,
    response_type: 'id_token',
    scope: 'openid email profile',
    nonce: crypto.randomUUID(),
    state: crypto.randomUUID(),
    prompt: 'select_account',
  });
  window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}

function signOut() {
  currentUser = null;
  localStorage.removeItem(USER_KEY);
  headerSub.textContent = 'Your private diary';
  signoutBtn.classList.remove('show');
  peopleBtn.classList.remove('show');
  setupEl.classList.remove('hidden');
  chatEl.innerHTML = '';
}

function showSignedInState() {
  if (currentUser && currentUser.name) {
    headerSub.textContent = currentUser.name + "\u2019s diary";
    signoutBtn.classList.add('show');
    if (currentUser.suiAddress) {
      const badge = document.getElementById('suiBadge');
      if (badge) {
        badge.textContent = truncateAddress(currentUser.suiAddress);
        badge.style.display = 'inline-block';
      }
    }
  }
  if (Object.keys(peopleMap).length > 0) {
    peopleBtn.classList.add('show');
  }
}

function startDemo() {
  isDemo = true;
  currentUser = { name: 'Demo', signedIn: false };
  setupEl.classList.add('hidden');
  headerSub.textContent = 'Demo mode';
  startChat();
}

function startChat() {
  loadAll();
  updateEntryCount();

  if (conversationHistory.length > 0) {
    const recent = conversationHistory.slice(-20);
    recent.forEach(m => {
      addMessage(m.content, m.role === 'user' ? 'user' : 'ai');
    });
    if (entries.length > 0) {
      addSystemMessage(entries.length + ' entries loaded. Your diary remembers.');
    }
  } else {
    if (isDemo) {
      addSystemMessage('Demo mode — showing how the diary talks. Your entries are still saved.');
    }
    const greeting = currentUser && currentUser.name && currentUser.name !== 'Demo'
      ? `Hey ${currentUser.name}. How was your session today?`
      : "Hey. How was your session today?";
    addMessage(greeting, 'ai');
    setChips(['It was great', 'Tough one today', "Didn't play today", "Something's on my mind"]);
  }

  inputEl.focus();
}

// ===== Init =====
(async function init() {
  // 1. Check for OAuth callback (redirect back from Google)
  const callbackJwt = checkOAuthCallback();
  if (callbackJwt) {
    await processOAuthCallback(callbackJwt);
    return;
  }

  // 2. Check for existing signed-in session
  loadAll();
  if (currentUser && currentUser.signedIn) {
    const savedProxy = localStorage.getItem('gd_proxy_url');
    if (savedProxy) { proxyUrl = savedProxy; isDemo = false; }
    else { isDemo = true; }
    setupEl.classList.add('hidden');
    showSignedInState();
    startChat();
    return;
  }

  // 3. Auto-demo from landing page link
  if (location.hash === '#demo' || sessionStorage.getItem('gd_auto_demo')) {
    sessionStorage.removeItem('gd_auto_demo');
    startDemo();
  }
})();
</script>
