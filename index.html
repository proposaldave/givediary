<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Give Diary — Who gives?</title>
<meta name="description" content="Your private diary to elevate what we give each other — so it compounds.">
<meta property="og:title" content="Give Diary — Who gives?">
<meta property="og:description" content="Your private diary to elevate what we give each other — so it compounds.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://givediary.com">
<meta name="twitter:card" content="summary_large_image">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --warm: #FFFAF5;
  --cream: #FEF3E2;
  --sand: #F5EBD9;
  --ink: #1A1612;
  --ink-soft: #6B5E50;
  --ink-faint: #A89882;
  --give: #C94D22;
  --give-hover: #A93D18;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--warm);
  color: var(--ink);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  opacity: 0.025;
  z-index: 9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 180px;
}

/* --- HERO --- */
.hero {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 2rem;
  position: relative;
}

.hero::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(255,214,160,0.18) 0%, transparent 70%);
  z-index: 0;
  filter: blur(60px);
  animation: breathe 6s ease-in-out infinite;
}

.hero h1 {
  position: relative;
  z-index: 1;
  font-family: 'Instrument Serif', serif;
  font-size: clamp(4rem, 12vw, 9rem);
  font-weight: 400;
  line-height: 1;
  letter-spacing: -0.04em;
  color: var(--give);
  font-style: italic;
  opacity: 0;
  animation: fadeUp 1s ease 0.3s forwards;
}

.scroll-hint {
  position: absolute;
  bottom: 2.5rem;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  animation: fadeUp 0.9s ease 1.5s forwards;
}

.scroll-hint span {
  display: block;
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, var(--ink-faint), transparent);
}

/* --- SECTIONS --- */
.s {
  max-width: 640px;
  margin: 0 auto;
  padding: 5rem 2rem;
}

/* --- QUESTIONS --- */
.questions { text-align: center; }

.question {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(1.5rem, 3.2vw, 2.3rem);
  font-weight: 400;
  font-style: italic;
  line-height: 1.3;
  color: var(--ink);
  margin-bottom: 1.8rem;
}

.question:last-child { margin-bottom: 0; }

/* --- INVISIBLE --- */
.invisible-head {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(1.5rem, 3.2vw, 2.3rem);
  font-weight: 400;
  line-height: 1.25;
  letter-spacing: -0.02em;
  margin-bottom: 1.5rem;
}

.invisible-body {
  font-size: clamp(1.05rem, 2vw, 1.15rem);
  line-height: 1.85;
  color: var(--ink-soft);
  font-weight: 300;
}

.invisible-body strong {
  color: var(--ink);
  font-weight: 500;
}

/* Staggered line reveals for emotional weight */
.line-reveal {
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}

.line-reveal.visible {
  opacity: 1;
  transform: translateY(0);
}

.line-delay-1 { transition-delay: 0s; }
.line-delay-2 { transition-delay: 0.3s; }
.line-delay-3 { transition-delay: 0.7s; }

/* --- BRAND --- */
.brand-section {
  text-align: center;
  position: relative;
  background: var(--cream);
  overflow: hidden;
}

/* Network canvas */
.network-canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  opacity: 0;
  transition: opacity 1.5s ease;
}

.brand-section.glowing .network-canvas {
  opacity: 1;
}

.brand-section .s {
  position: relative;
  z-index: 1;
}

.brand-name {
  font-family: 'Instrument Serif', serif;
  font-size: clamp(2.2rem, 5vw, 3.5rem);
  font-weight: 400;
  letter-spacing: -0.02em;
  margin-bottom: 1.5rem;
}

.brand-name .give { color: var(--give); }
.brand-name .diary { font-style: italic; }

.brand-body {
  font-size: clamp(1.02rem, 1.9vw, 1.12rem);
  line-height: 1.85;
  color: var(--ink-soft);
  font-weight: 300;
  max-width: 520px;
  margin: 0 auto;
  text-align: left;
}

.brand-body strong {
  color: var(--ink);
  font-weight: 500;
}

/* --- RALLY --- */
.rally { text-align: center; }

.rally-line {
  font-size: clamp(1.1rem, 2.2vw, 1.3rem);
  line-height: 1.7;
  color: var(--ink);
  font-weight: 400;
  letter-spacing: 0.01em;
  margin-bottom: 2rem;
}

.rally-line strong { font-weight: 600; }

.rally-line em {
  color: var(--give);
  font-style: italic;
}

.cta-primary {
  background: var(--give);
  color: #fff;
  border: none;
  padding: 1rem 2.8rem;
  font-size: 1.05rem;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  border-radius: 60px;
  cursor: pointer;
  transition: all 0.3s ease;
  text-decoration: none;
  display: inline-block;
}

.cta-primary:hover {
  background: var(--give-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(201,77,34,0.2);
}

/* --- FOOTER --- */
.foot {
  padding: 3rem 2rem 2rem;
  text-align: center;
  border-top: 1px solid rgba(26,22,18,0.06);
}

.foot-logo {
  font-family: 'Instrument Serif', serif;
  font-size: 1.4rem;
  margin-bottom: 0.3rem;
}

.foot-logo .give { color: var(--give); }
.foot-logo .diary { font-style: italic; }

.foot-tag {
  font-size: 0.9rem;
  color: var(--ink-faint);
  font-weight: 300;
}

/* --- ANIMATIONS --- */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes breathe {
  0%, 100% { opacity: 0.12; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 0.22; transform: translate(-50%, -50%) scale(1.08); }
}

.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}

.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}

.stagger-1 { transition-delay: 0s; }
.stagger-2 { transition-delay: 0.25s; }

@media (max-width: 640px) {
  .s { padding: 4rem 1.5rem; }
  .brand-line { white-space: normal !important; }
}
</style>
</head>
<body>

<!-- 1. THE QUESTION -->
<section class="hero">
  <h1>Who gives?</h1>
  <div class="scroll-hint"><span></span></div>
</section>

<!-- 2. THE THREE QUESTIONS -->
<div class="s questions">
  <p class="question reveal stagger-1">Who gives you energy?</p>
  <p class="question reveal stagger-2">Who elevates your community?</p>
  <p class="reveal" style="margin-top:3rem; font-size:clamp(1.05rem,2vw,1.18rem); color:var(--ink-soft); font-weight:300; line-height:1.8;">You know. But it's trapped in your head.</p>
</div>

<!-- 3. BRAND REVEAL (right after the questions) -->
<div class="brand-section" id="brandSection">
  <canvas class="network-canvas" id="networkCanvas"></canvas>
  <div class="s">
    <p class="brand-body reveal" style="text-align:center; font-family:'Instrument Serif',serif; font-size:clamp(1.2rem,2.5vw,1.6rem); color:var(--ink); white-space:nowrap;" class="brand-line"><span style="color:var(--give)">Give</span> <em>Diary</em> learns what we give each other &mdash; and makes it grow.</p>
  </div>
</div>

<!-- 4. THE RALLY -->
<div class="s rally">
  <a class="cta-primary reveal" href="chat.html">Who gives?</a>
</div>

<!-- 6. PRIVACY -->
<div class="s" style="text-align:center;">
  <p class="reveal" style="font-size:0.95rem; color:var(--ink-faint); font-weight:300; display:flex; align-items:center; justify-content:center; gap:0.5rem;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--ink-faint); flex-shrink:0;">
      <rect x="3" y="11" width="18" height="11" rx="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    Give Diary is yours, forever. Through your eyes, for your eyes only.
  </p>
  <p class="reveal" style="font-size:0.85rem; color:var(--ink-faint); font-weight:300; margin-top:0.6rem;">Powered by <a href="https://sui.io" target="_blank" rel="noopener" style="color:#4DA2FF; text-decoration:none; font-weight:500;">Sui</a></p>
</div>

<!-- FOOTER -->
<footer class="foot">
  <div class="foot-logo"><svg class="book-icon" width="18" height="22" viewBox="0 0 18 22" fill="none" style="vertical-align:middle; margin-right:6px;"><rect x="1" y="1" width="14" height="19" rx="2" stroke="var(--ink-faint)" stroke-width="1.2"/><path d="M15 1l-3 3H1" stroke="none" fill="var(--give)" opacity="0.6" d="M12,1 L15,1 L15,4 Z"/><line x1="4" y1="8" x2="12" y2="8" stroke="var(--ink-faint)" stroke-width="0.7" opacity="0.4"/><line x1="4" y1="11" x2="10" y2="11" stroke="var(--ink-faint)" stroke-width="0.7" opacity="0.4"/></svg><span class="give">Give</span> <span class="diary">Diary</span></div>
  <p class="foot-tag">Give freely.</p>
</footer>

<script>
// Scroll reveal for .reveal elements
const obs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
      obs.unobserve(e.target);
    }
  });
}, { threshold: 0.15 });
document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

// Line-by-line reveal for emotional beats
const lineObs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
      lineObs.unobserve(e.target);
    }
  });
}, { threshold: 0.3 });
document.querySelectorAll('.line-reveal').forEach(el => lineObs.observe(el));

// Brand section warm glow bloom + network
const brandObs = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('glowing');
      initNetwork();
      brandObs.unobserve(e.target);
    }
  });
}, { threshold: 0.2 });
brandObs.observe(document.getElementById('brandSection'));

// Warmth-spreading network — giving becomes visible
function initNetwork() {
  const canvas = document.getElementById('networkCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const section = canvas.parentElement;

  function resize() {
    canvas.width = section.offsetWidth;
    canvas.height = section.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const dots = [];
  const connectionDist = 140;
  const count = Math.min(Math.floor(canvas.width / 35), 40);

  for (let i = 0; i < count; i++) {
    dots.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.15,
      vy: (Math.random() - 0.5) * 0.15,
      r: Math.random() * 1.5 + 1.5,
      warmth: 0,        // 0 = invisible, 1 = fully warm
      targetWarmth: 0
    });
  }

  // Periodically trigger a "give" — one dot warms up
  function triggerGive() {
    const dot = dots[Math.floor(Math.random() * dots.length)];
    dot.targetWarmth = 1;

    // After a beat, spread warmth to neighbors
    setTimeout(() => {
      dots.forEach(other => {
        if (other === dot) return;
        const dx = dot.x - other.x;
        const dy = dot.y - other.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < connectionDist) {
          const spread = (1 - dist / connectionDist) * 0.7;
          other.targetWarmth = Math.min(1, other.targetWarmth + spread);
          // Second-order spread
          setTimeout(() => {
            dots.forEach(third => {
              if (third === other || third === dot) return;
              const dx2 = other.x - third.x;
              const dy2 = other.y - third.y;
              const dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);
              if (dist2 < connectionDist) {
                third.targetWarmth = Math.min(1, third.targetWarmth + (1 - dist2 / connectionDist) * 0.35);
              }
            });
          }, 600);
        }
      });
    }, 300);

    // Schedule next give
    setTimeout(triggerGive, 2000 + Math.random() * 2000);
  }

  // Start giving after a short delay
  setTimeout(triggerGive, 800);

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Connections — glow based on warmth of both endpoints
    for (let i = 0; i < dots.length; i++) {
      for (let j = i + 1; j < dots.length; j++) {
        const dx = dots[i].x - dots[j].x;
        const dy = dots[i].y - dots[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < connectionDist) {
          const pairWarmth = Math.min(dots[i].warmth, dots[j].warmth);
          const baseAlpha = 0.03 * (1 - dist / connectionDist);
          const warmAlpha = pairWarmth * 0.15 * (1 - dist / connectionDist);
          ctx.beginPath();
          ctx.moveTo(dots[i].x, dots[i].y);
          ctx.lineTo(dots[j].x, dots[j].y);
          ctx.strokeStyle = `rgba(201, 77, 34, ${baseAlpha + warmAlpha})`;
          ctx.lineWidth = 0.5 + pairWarmth * 0.8;
          ctx.stroke();
        }
      }
    }

    // Dots — grow and glow with warmth
    dots.forEach(d => {
      // Ease warmth toward target
      d.warmth += (d.targetWarmth - d.warmth) * 0.04;
      // Decay target slowly
      d.targetWarmth *= 0.997;

      const alpha = 0.06 + d.warmth * 0.25;
      const radius = d.r + d.warmth * 2;

      // Warm glow halo
      if (d.warmth > 0.1) {
        ctx.beginPath();
        ctx.arc(d.x, d.y, radius + d.warmth * 8, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 214, 160, ${d.warmth * 0.08})`;
        ctx.fill();
      }

      // Core dot
      ctx.beginPath();
      ctx.arc(d.x, d.y, radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201, 77, 34, ${alpha})`;
      ctx.fill();

      // Drift
      d.x += d.vx;
      d.y += d.vy;
      if (d.x < 0 || d.x > canvas.width) d.vx *= -1;
      if (d.y < 0 || d.y > canvas.height) d.vy *= -1;
    });

    requestAnimationFrame(draw);
  }
  draw();
}
</script>
</body>
</html>
