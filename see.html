<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GiveDiary</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg' fill='none'%3E%3Crect x='18' y='10' width='44' height='60' rx='3' stroke='%234da2ff' stroke-width='3'/%3E%3Crect x='18' y='10' width='6' height='60' rx='2' fill='%234da2ff' opacity='0.4'/%3E%3Cpath d='M62 10L62 26L46 10Z' fill='%23f0c674' opacity='0.8'/%3E%3C/svg%3E">
<meta property="og:title" content="GiveDiary">
<meta property="og:description" content="Every club has heard this. No club tracks it.">
<meta name="twitter:card" content="summary">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'DM Sans',sans-serif;
  background:#07070b;
  color:#e8e6e1;
  height:100dvh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:2rem;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

.logo{
  position:absolute;
  top:1.5rem;
  left:2rem;
  font-family:'Playfair Display',serif;
  font-size:0.9rem;
  font-weight:700;
  letter-spacing:-0.02em;
  opacity:0.4;
}
.logo em{font-style:italic;color:#f0c674}

.content{
  max-width:420px;
  text-align:center;
}

.quote{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.6rem,5vw,2.2rem);
  font-style:italic;
  font-weight:400;
  line-height:1.35;
  color:#f0c674;
  margin-bottom:2.5rem;
  opacity:0;
  animation:fadeUp 1s ease 0.3s forwards;
}

.blind{
  font-size:clamp(0.95rem,2.5vw,1.05rem);
  color:#666;
  line-height:1.7;
  margin-bottom:2.5rem;
  opacity:0;
  animation:fadeUp 1s ease 0.8s forwards;
}
.blind strong{color:#e8e6e1;font-weight:400}

.proof{
  font-size:0.8rem;
  color:#444;
  line-height:1.8;
  margin-bottom:3rem;
  opacity:0;
  animation:fadeUp 1s ease 1.3s forwards;
}
.proof strong{color:#666;font-weight:500}

.turn{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.1rem,3vw,1.4rem);
  font-style:italic;
  color:#555;
  margin-bottom:2.5rem;
  opacity:0;
  animation:fadeUp 1s ease 1.8s forwards;
}

.cta{
  font-size:0.75rem;
  color:#f0c674;
  opacity:0;
  letter-spacing:0.03em;
  animation:fadeUp 1s ease 2.3s forwards;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}

@media(max-width:480px){
  body{padding:1.5rem}
  .logo{top:1rem;left:1.5rem}
}
</style>
</head>
<body>

<div class="logo">Give<em>Diary</em></div>

<div class="content">
  <p class="quote">"I stopped going because of one person."</p>
  <p class="blind">Every club has heard this.<br><strong>No club tracks it.</strong></p>
  <p class="proof"><strong>We do.</strong> 6 years. 450 members. 20,000 invitations.<br>We know who gives — and who doesn't.</p>
  <p class="turn">What if your club could too?</p>
  <p class="cta">Reply to the text that sent you here.</p>
</div>

</body>
</html>
